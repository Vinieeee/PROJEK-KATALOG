<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Perpustakaan</title>
    <link rel="stylesheet" href="css/style-admin.css">
  </head>

  <body>

    <div class="container">
      <aside class="sidebar">
      <!-- Side Menu -->
        <div class="logo">
          <a href="login-admin.html">
            <img src="src/logo mikro putih.webp" alt="Logo Mikro">
          </a>
        </div>
        <nav class="nav-menu">
          <ul>
            <li><a href="login-admin.html"><span>🏠</span> Dashboard</a></li>
            <li><a href="add-book.html" class="active"><span>📚</span> Add Book</a></li>
            <li><a href="galeri-admin.html"><span>🖼️</span> Galeri</a></li>
            <li><a href="index.html"><span>🚪</span> Logout</a></li>
          </ul>
        </nav>
      </aside>

      <div class="main-content">
        <!-- Header -->
        <header class="topbar">
          <h1>Add Book</h1>
        </header>

        <!-- Main -->
        <main>
          <section>
            <form id="formTambah" action="#" method="get" class="form-card">
                <div class="form-group">
                  <label for="Judul Buku">Judul Buku</label>
                  <input
                    type="text"
                    id="Judul Buku"
                    name="Judul Buku"
                    placeholder="Masukkan Judul Buku"/>
                </div>

                <div class="form-group">
                  <label for="Pengarang">Pengarang</label>
                  <input
                    type="text"
                    id="Pengarang"
                    name="Pengarang"
                    placeholder="Masukkan Nama Pengarang"/>
                </div>

                <div class="form-group">
                  <label for="Kategori">Kategori</label>
                  <select id="Kategori" name="Kategori" required>
                    <option value="">— Pilih Kategori —</option>
                    <option value="All">All</option>
                    <option value="Fiction">Fiction</option>
                    <option value="KPS">KPS</option>
                    <option value="Reference">Reference</option>
                    <option value="Text Book">Text Book</option>
                  </select>
                </div>

                <div class="form-group">
                  <label for="Cover">Cover</label>
                    <input 
                      type="file" 
                      id="Cover" 
                      name="Cover">
                </div>

                <div class="form-group full">
                  <label for="Abstrak">Abstrak</label>
                  <textarea
                    id="Abstrak"
                    name="Abstrak"
                    rows="5"
                    placeholder="Abstrak Buku..."
                  ></textarea>
                </div>

                <div class="form-group">
                  <label for="Judul Seri">Judul Seri</label>
                  <input
                    type="text"
                    id="Judul Seri"
                    name="Judul Seri"
                    placeholder="Masukkan Judul Seri"/>
                </div>

                <div class="form-group">
                  <label for="No Panggil">No Panggil</label>
                  <input
                    type="text"
                    id="No Panggil"
                    name="No Panggil"
                    placeholder="Masukkan No Panggil"/>
                </div>

                <div class="form-group">
                  <label for="Penerbit">Penerbit</label>
                  <input
                    type="text"
                    id="Penerbit"
                    name="Penerbit"
                    placeholder="Masukkan Nama Penerbit"/>
                </div>

                <div class="form-group">
                  <label for="Deskripsi Fisik">Deskripsi Fisik</label>
                  <input
                    type="text"
                    id="Deskripsi Fisik"
                    name="Deskripsi Fisik"
                    placeholder="Masukkan Deskripsi Fisik"/>
                </div>

                <div class="form-group">
                  <label for="Bahasa">Bahasa</label>
                  <input
                    type="text"
                    id="Bahasa"
                    name="Bahasa"
                    placeholder="Masukkan Bahasa Buku"/>
                </div>

                <div class="form-group">
                  <label for="ISBN/ISSN">ISBN/ISSN</label>
                  <input
                    type="text"
                    id="ISBN/ISSN"
                    name="ISBN/ISSN"
                    placeholder="Masukkan ISBN/ISSN"/>
                </div>

                <div class="form-group">
                  <label for="Klasifikasi">Klasifikasi</label>
                  <input
                    type="text"
                    id="Klasifikasi"
                    name="Klasifikasi"
                    placeholder="Masukkan Klasifikasi"/>
                </div>

                <div class="form-group">
                  <label for="Tipe Isi">Tipe Isi</label>
                  <input
                    type="text"
                    id="Tipe Isi"
                    name="Tipe Isi"
                    placeholder="Masukkan Tipe Isi"/>
                </div>

                <div class="form-group">
                  <label for="Tipe Media">Tipe Media</label>
                  <input
                    type="text"
                    id="Tipe Media"
                    name="Tipe Media"
                    placeholder="Masukkan Tipe Media"/>
                </div>

                <div class="form-group">
                  <label for="Tipe Pembawa">Tipe Pembawa</label>
                  <input
                    type="text"
                    id="Tipe Pembawa"
                    name="Tipe Pembawa"
                    placeholder="Masukkan Tipe Pembawa"/>
                </div>

                <div class="form-group">
                  <label for="Edisi">Edisi</label>
                  <input
                    type="text"
                    id="Edisi"
                    name="Edisi"
                    placeholder="Masukkan Edisi"/>
                </div>

                <div class="form-group">
                  <label for="Subjek">Subjek</label>
                  <input
                    type="text"
                    id="Subjek"
                    name="Subjek"
                    placeholder="Masukkan Subjek"/>
                </div>

                <div class="form-group full">
                  <label for="Info Detail Spesifikasi">Info Detail Spesifikasi</label>
                  <textarea
                    id="Info Detail Spesifikasi"
                    name="Info Detail Spesifikasi"
                    rows="3"
                    placeholder="Info Detail Spesifikasi..."
                  ></textarea>
                </div>

                <div class="form-group full">
                  <label for="Pernyataan Tanggung Jawab">Pernyataan Tanggung Jawab</label>
                  <textarea
                    id="Pernyataan Tanggung Jawab"
                    name="Pernyataan Tanggung Jawab"
                    rows="3"
                    placeholder="Pernyataan Tanggung Jawab..."
                  ></textarea>
                </div>

                <div class="form-actions">
                  <button type="submit" class="btn btn-primary"><span class="icon-add">+</span>Add</button>
                  <button type="reset" class="btn btn-outline"><span class="icon-reset">↺</span>Reset</button>           
                </div>

                <div id="formError" style="color:red;"></div>
          </section>
        </main>

        <!-- FOOTER -->
        <footer>
          <p>&copy; 2026 Katalog - Kevin</p>
        </footer>
      </div>
    </div>
  <script src="js/script.js"></script>
  </body>
</html>
