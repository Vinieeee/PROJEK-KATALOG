<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Perpustakaan</title>
    <link rel="stylesheet" href="css/style.css">
  </head>

  <body id="bg-slide">
    <!-- ================= HEADER ================= -->
    <header class="navbar">
      <div class="navbar-inner">
        <a href="index.html" class="logo">
          <img src="src/logo mikro putih.webp" alt="Logo Mikro">
        </a>
        <input type="checkbox" id="navToggle" class="nav-toggle">
        <label for="navToggle" class="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </label>
        <nav>
          <ul class="nav-menu">
            <p>MENU</p>
            <br>
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="galeri.html">Galeri</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="login-admin.html">Admin</a></li>
          </ul>
        </nav>
      </div>
    </header>


    <!-- ================= MAIN ================= -->
    <main>
      <!-- HERO -->
      <section class="hero">
        <div class="hero-content">
          <h1>PERPUSTAKAAN MIKROSKIL</h1>
          <p>Akses ilmu mudah, cepat, dan tanpa batas.</p>
        </div>
        
        <div class="search-container">
          <!-- SEARCH -->
          <div class="search">
            <input type="text" placeholder="Cari judul, pengarang, atau kategori...">
            <button>Cari</button>
          </div>
          <!-- ADVANCED BUTTON -->
          <div class="advanced-btn">
            <a href="#" id="openAdvanced">Advanced Search</a>
          </div>
        </div>
      </section>

      <!-- ================= POPUP ================= -->
      <div id="advanced-pop-up" class="pop-up">
        <div class="pop-up-container">
          <span class="close">&times;</span>
          <h2>ADVANCED SEARCH</h2>

          <form>
            <label>Judul:</label>
            <input type="text">

            <label>Pengarang:</label>
            <input type="text">

            <label>Kategori:</label>
            <input type="text">

            <label>Tahun terbit:</label>
            <input type="text">

            <button type="submit">Pencarian</button>
          </form>
        </div>
      </div>



    </main>

    <!-- ================= FOOTER ================= -->
