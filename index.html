  <body id="bg-slide">
    <div class="bg-trans">
      <!-- ================= HEADER ================= -->
      <header class="navbar">
        <div class="navbar-inner">
          <a href="index.html" class="logo">
            <img src="src/logo mikro putih.webp" alt="Logo Mikro">
          </a>
          <input type="checkbox" id="navToggle" class="nav-toggle">
          <label for="navToggle" class="hamburger">
            <span></span>

            <span></span>

          <nav>

      <!-- ================= MAIN ================= -->
      <main>
        <!-- HERO -->
        <section class="hero">
          <!-- SEARCH -->
          <div class="search-container">
              <h1>CARI</h1>
              <p>masukkan satu atau lebih kata kunci dari judul, pengarang, atau subyek</p>
            <div class="search">
              <input type="text" placeholder="e.g. Library and Information">
              <button>Cari</button>
            </div>
            <div class="advanced-btn">
              <a href="#" id="openAdvanced">Advanced Search</a>
            </div>
          </div>
        
          <!-- POP-UP ADVANCED -->
          <div id="advanced-pop-up" class="pop-up">
            <div class="pop-up-container">
              <span class="close">&times;</span>
              <h2>ADVANCED SEARCH</h2>

              <form>
                <label>Judul:</label>
                <input type="text">
                <label>Pengarang:</label>
                <input type="text">
                <label>Kategori:</label>
                <input type="text">
                <label>Tahun terbit:</label>
                <input type="text">
                <button type="submit">Pencarian</button>
              </form>
            </div>
          </div>

        </section>
        <section class="book-slider">
          <div class="book-track" id="bookTrack">
            <div class="book"><img src="src/bg1.webp"></div>
            <div class="book"><img src="src/bg2.webp"></div>
            <div class="book"><img src="src/bg3.webp"></div>

            <div class="book"><img src="src/bg4.webp"></div>
